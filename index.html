<!DOCTYPE html>
<html>
<head>
  <title>ワンピカードデッキ</title>

  <style>
    body {
      font-family: sans-serif;
      background: #f0f2f5;
      text-align: center;
    }

    #cardArea {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    #deckList {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      padding: 0;
    }

    #deckList li {
      list-style: none;
      background: white;
      border-radius: 10px;
      padding: 10px;
      width: 120px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    #deckList img {
      width: 100%;
      border-radius: 5px;
    }

    button {
      border: none;
      background: none;
    }

    button img {
      border-radius: 5px;
    }

    .delete-btn {
      margin-top: 5px;
      padding: 5px;
      background: #ff6b6b;
      color: white;
      border-radius: 5px;
    }
  </style>

</head>
<body>

<h1>カードを選ぶ</h1>

<!-- 自動生成される -->
<div id="cardArea"></div>

<h2>デッキ</h2>
<p>合計枚数：<span id="total">0</span></p>
<ul id="deckList"></ul>

<script>

// ▼ カード一覧（ここに追加するだけでOK🔥）
const cardList = [
  { name: "ルフィ", img: "st01-012.webp" },
  { name: "ゾロ", img: "st01-013.webp" },
  { name: "ナミ", img: "st01-007.webp" },

  // ↓ここにどんどん追加
  { name: "サンジ", img: "sanji.webp" },
  { name: "チョッパー", img: "chopper.webp" },
  { name: "エース", img: "ace.webp" }
];

// ▼ 保存データ
let deck = JSON.parse(localStorage.getItem("deck")) || {};

// ▼ カード画像取得
function getCardImage(name) {
  const card = cardList.find(c => c.name === name);
  return card ? card.img : "";
}

// ▼ カード追加
function addCard(name) {

  let total = 0;
  for (let card in deck) {
    total += deck[card];
  }

  if (total >= 50) {
    alert("デッキは50枚まで！");
    return;
  }

  if (deck[name] >= 4) {
    alert("同じカードは4枚まで！");
    return;
  }

  if (deck[name]) {
    deck[name]++;
  } else {
    deck[name] = 1;
  }

  displayDeck();
}

// ▼ デッキ表示
function displayDeck() {
  const list = document.getElementById("deckList");
  list.innerHTML = "";

  for (let card in deck) {
    const li = document.createElement("li");

    li.innerHTML = `
      <img src="${getCardImage(card)}">
      <p>${card}</p>
      <p>×${deck[card]}</p>
      <button class="delete-btn" onclick="removeCard('${card}')">削除</button>
    `;

    list.appendChild(li);
  }

  let total = 0;
  for (let card in deck) {
    total += deck[card];
  }

  document.getElementById("total").textContent = total;

  localStorage.setItem("deck", JSON.stringify(deck));
}

// ▼ 削除
function removeCard(name) {
  deck[name]--;
  if (deck[name] <= 0) {
    delete deck[name];
  }
  displayDeck();
}

// ▼ カード一覧を自動生成🔥
const area = document.getElementById("cardArea");

cardList.forEach(card => {
  const btn = document.createElement("button");
  btn.innerHTML = `<img src="${card.img}" width="80">`;
  btn.onclick = () => addCard(card.name);
  area.appendChild(btn);
});

// ▼ 初期表示
displayDeck();

</script>

</body>
</html>
