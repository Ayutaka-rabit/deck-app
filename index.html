<!DOCTYPE html>
<html>
<head>
  <title>ワンピカードデッキ</title>

  <style>
    body {
      font-family: sans-serif;
      background: #f0f2f5;
      text-align: center;
    }

    #deckList {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      padding: 0;
    }

    #deckList li {
      list-style: none;
      background: white;
      border-radius: 10px;
      padding: 10px;
      width: 120px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    #deckList img {
      width: 100%;
      border-radius: 5px;
    }

    button {
      margin-top: 5px;
      padding: 5px;
      border: none;
      background: #ff6b6b;
      color: white;
      border-radius: 5px;
    }
  </style>

</head>
<body>

<h1>カードを選ぶ</h1>

<!-- カード選択（画像付き） -->
<button onclick="addCard('ルフィ')">
  <img src="st01-012.webp" width="80">
</button>

<button onclick="addCard('ゾロ')">
  <img src="st01-013.webp" width="80">
</button>

<button onclick="addCard('ナミ')">
  <img src="st01-007.webp" width="80">
</button>

<h2>デッキ</h2>
<p>合計枚数：<span id="total">0</span></p>
<ul id="deckList"></ul>

<script>
// カード画像データ
const cards = {
  "ルフィ": "st01-012.webp",
  "ゾロ": "st01-013.webp",
  "ナミ": "st01-007.webp"
};

// 保存データ読み込み
let deck = JSON.parse(localStorage.getItem("deck")) || {};

function addCard(name) {

  // 合計50枚制限
  let total = 0;
  for (let card in deck) {
    total += deck[card];
  }
  if (total >= 50) {
    alert("デッキは50枚まで！");
    return;
  }

  // 同カード4枚制限
  if (deck[name] >= 4) {
    alert("同じカードは4枚まで！");
    return;
  }

  // 追加
  if (deck[name]) {
    deck[name]++;
  } else {
    deck[name] = 1;
  }

  displayDeck();
}

function displayDeck() {
  const list = document.getElementById("deckList");
  list.innerHTML = "";

  for (let card in deck) {
    const li = document.createElement("li");

    li.innerHTML = `
      <img src="${cards[card]}">
      <p>${card}</p>
      <p>×${deck[card]}</p>
      <button onclick="removeCard('${card}')">削除</button>
    `;

    list.appendChild(li);
  }

  // 合計枚数表示
  let total = 0;
  for (let card in deck) {
    total += deck[card];
  }
  document.getElementById("total").textContent = total;

  // 保存
  localStorage.setItem("deck", JSON.stringify(deck));
}

function removeCard(name) {
  deck[name]--;
  if (deck[name] <= 0) {
    delete deck[name];
  }
  displayDeck();
}

// 初期表示
displayDeck();

</script>

</body>
</html>
